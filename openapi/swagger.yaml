host: localhost:8081
info:
  contact:
    name: Sercha OSS
    url: https://github.com/custodia-labs/sercha-core/issues
  description: Privacy-focused enterprise search API. Sercha Core provides full-text
    and semantic search across your connected data sources.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Sercha Core API
  version: "1.0"
paths:
  /admin/jobs:
    get:
      description: Get paginated list of completed and failed jobs (admin only)
      parameters:
      - description: Max results (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: 'Filter by status: completed or failed'
        in: query
        name: status
        type: string
      - description: 'Filter by type: sync_all, sync_source, refresh_tokens'
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_custodia-labs_sercha-core_internal_core_ports_driving.JobHistoryResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "403":
          description: Forbidden - admin only
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List job history
      tags:
      - Jobs
  /admin/jobs/{id}:
    get:
      description: Get full details of a specific job/task (admin only)
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_custodia-labs_sercha-core_internal_core_ports_driving.JobDetail'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "403":
          description: Forbidden - admin only
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "404":
          description: Job not found
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get job details
      tags:
      - Jobs
  /admin/jobs/stats:
    get:
      description: Get queue statistics including pending, processing, completed,
        and failed counts (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_custodia-labs_sercha-core_internal_core_ports_driving.JobStats'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "403":
          description: Forbidden - admin only
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get job queue statistics
      tags:
      - Jobs
  /admin/jobs/upcoming:
    get:
      description: Get pending tasks and scheduled task configurations (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_custodia-labs_sercha-core_internal_core_ports_driving.UpcomingJobsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "403":
          description: Forbidden - admin only
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List upcoming jobs
      tags:
      - Jobs
  /admin/reindex:
    post:
      consumes:
      - application/json
      description: Clear all indexed documents and trigger a full re-sync of all sources
        (admin only).
      parameters:
      - description: Reindex request with confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_adapters_driving_http.ReindexRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ReindexResponse'
        "400":
          description: Missing confirmation or invalid request
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "403":
          description: Forbidden - admin only
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger reindex
      tags:
      - Admin
  /admin/search/analytics:
    get:
      description: Get aggregated search statistics including total searches, searches
        today/this week, average latency, and top queries (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_custodia-labs_sercha-core_internal_core_domain.SearchAnalytics'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "403":
          description: Forbidden - admin only
          schema:
            $ref: '#/definitions/internal_adapters_driving_http.ErrorResponse'
        "500":
